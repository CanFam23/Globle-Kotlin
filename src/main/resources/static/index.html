<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Globle</title>
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />

  <link href="https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.css" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.js"></script>
</head>
<body>
<h1>Globle</h1>

<div>
  <p id="bestScore">Best Score:</p>
  <p id="bestCountry">Country:</p>
</div>

<form id="countryForm">
  <input
          type="text"
          id="searchBox"
          list="suggestions"
          placeholder="Guess a country..."
          autocomplete="off"
  />
  <datalist id="suggestions"></datalist>
  <button id="submitBtn" type="submit">Check</button>
</form>

<div id="userFeedbackdiv">
  <p id="numGuess">Number of guesses: 0</p>
  <p id="msg"></p>
  <button id="newGameBtn" type="button">New Game</button>
</div>

<div id="map"></div>

<p>Previous Guesses:</p>
<ul id="pastGuesses"></ul>

<script src="/script.js"></script>
</body>
</html>
